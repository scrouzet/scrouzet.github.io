baseURL = "https://scrouzet.github.io/"
languageCode = "fr-fr"
title = "Sebastien Crouzet"
theme = "PaperMod"

[params]
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowBreadCrumbs = true
ShowRssButtonInSectionTermList = true
mainSections = ["posts"]

[params.homeInfoParams]
Title = "Bienvenue"
Content = "Je partage ici des notes sur l'IA, la data et la recherche."

[[params.socialIcons]]
name = "github"
url = "https://github.com/scrouzet"

[[params.socialIcons]]
name = "rss"
url = "/posts/index.xml"

[params.buttondown]
username = "CHANGE_ME_BUTTONDOWN_USERNAME"
title = "Newsletter"
description = "Recevoir les nouveaux articles par email."
placeholder = "vous@exemple.com"
buttonLabel = "S'inscrire"
successRedirect = "https://buttondown.email"

[outputs]
home = ["HTML", "RSS", "JSON"]

[menu]
[[menu.main]]
identifier = "posts"
name = "Articles"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "about"
name = "A propos"
url = "/about/"
weight = 20

[[module.imports]]
path = "github.com/adityatelange/hugo-PaperMod"
